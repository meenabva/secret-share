spring:
  application:
    name: secret-share

  datasource:
    url: jdbc:postgresql://localhost:5432/pastebin
    username: paste_user
    password: paste_pass
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

app:
  base-url: http://localhost:8080
  default-ttl-hours: 24
  max-paste-size-bytes: 1048576  # 1 MB